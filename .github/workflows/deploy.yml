name: Deploy to GitHub Pages

on:
  push:
    branches:
      - master
    paths:
      - "project--1/artifacts/hungry-ninja/**"
      - ".github/workflows/deploy.yml"

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Build
        working-directory: project--1/artifacts/hungry-ninja
        run: |
          npm install
          PORT=3000 BASE_PATH=/HTML-Project/ npx vite build --config vite.config.ts

      - uses: actions/configure-pages@v4

      - name: Upload Pages Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: project--1/artifacts/hungry-ninja/dist/public

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
